name: 🤖 Agente Tesis - Batch 24h

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scraping_batch:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🧪 Verificar configuración
        run: python agent/main.py --test

      - name: 🚀 Ejecutar batch completo
        run: python agent/main.py --batch

      - name: 💾 Guardar datos como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: datos-batch-${{ github.run_number }}-${{ github.run_id }}
          path: |
            data/raw/
            logs/
          retention-days: 90

      - name: 📤 Commit y push de datos
        run: |
          git config user.name "🤖 Agente ROI Bot"
          git config user.email "actions@github.com"
          git add data/ logs/ || true
          git diff --staged --quiet || git commit -m "📊 Batch #${{ github.run_number }} - $(date +'%Y-%m-%d %H:%M') UTC"
          git push || true

